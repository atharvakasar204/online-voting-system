<!DOCTYPE html>
<html>

<head>

    <title>Register</title>

    <style>

        body{
            font-family:Arial;
            background:#f2f5f9;
        }

        .box{
            width:400px;
            margin:auto;
            margin-top:30px;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        h2{
            text-align:center;
            margin-bottom:20px;
        }

        input{
            width:100%;
            padding:10px;
            margin-top:10px;
            margin-bottom:15px;
            border:1px solid #ccc;
            border-radius:5px;
        }

        label{
            font-weight:bold;
        }

        button{
            width:100%;
            padding:12px;
            background:#007BFF;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#0056b3;
        }

        .candidate-btn{
            background:green;
        }

        .candidate-btn:hover{
            background:darkgreen;
        }

        a{
            text-decoration:none;
        }

        .login-link{
            text-align:center;
            margin-top:15px;
        }

    </style>

</head>

<body>

<div class="box">

    <h2>Student Registration</h2>

    <form action="/register"
          method="post"
          enctype="multipart/form-data">

        <!-- FULL NAME -->
        <label>Full Name</label>

        <input type="text"
               name="full_name"
               placeholder="Enter Full Name"
               required>

        <!-- USERNAME -->
        <label>Username</label>

        <input type="text"
               name="username"
               placeholder="Enter Username"
               required>

        <!-- PASSWORD -->
        <label>Password</label>

        <input type="password"
               name="password"
               placeholder="Enter Password"
               required>

        <!-- PHONE -->
        <label>Phone Number</label>

        <input type="text"
               name="phone"
               placeholder="Enter Phone Number"
               required>

        <!-- AGE -->
        <label>Age</label>

        <input type="number"
               name="age"
               placeholder="Enter Age"
               required>

        <!-- UNIQUE ID -->
        <label>Association Unique ID</label>

        <input type="text"
               name="unique_id"
               placeholder="Enter Unique ID"
               required>

        <!-- ID PROOF -->
        <label>Upload ID Proof</label>

        <input type="file"
               name="id_proof"
               required>

        <!-- FACE IMAGE -->
        <label>Upload Face Photo</label>

        <input type="file"
               name="face_image"
               required>

        <!-- REGISTER BUTTON -->
        <button type="submit">

            Register

        </button>

    </form>

    <!-- APPLY CANDIDATE -->
    <br>

    <a href="/apply_candidate">

        <button type="button"
                class="candidate-btn">

            Apply as Candidate

        </button>

    </a>

    <!-- LOGIN LINK -->
    <div class="login-link">

        <br>

        <a href="/apply_candidate>

            Already have account? Login

        </a>

    </div>

</div>

</body>
</html>
