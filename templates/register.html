<!DOCTYPE html>
<html>

<head>

    <title>Register</title>

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <style>

        *{
            box-sizing:border-box;
        }

        body{
            font-family:Arial;
            background:#f2f5f9;
            margin:0;
            padding:10px;
        }

        .container{

            width:100%;
            max-width:420px;

            background:white;

            margin:auto;

            padding:18px;

            border-radius:10px;

            box-shadow:0 0 8px rgba(0,0,0,0.1);

        }

        h2{

            text-align:center;
            margin-bottom:18px;
            font-size:22px;

        }

        label{

            font-size:14px;
            font-weight:bold;

        }

        input{

            width:100%;

            padding:10px;

            margin-top:5px;
            margin-bottom:12px;

            border:1px solid #ccc;

            border-radius:5px;

            font-size:14px;

        }

        button{

            width:100%;

            padding:10px;

            background:#007BFF;

            color:white;

            border:none;

            border-radius:5px;

            font-size:15px;

            cursor:pointer;

            margin-top:5px;

        }

        button:hover{

            background:#0056b3;

        }

        .candidate-btn{

            background:green;

        }

        .candidate-btn:hover{

            background:darkgreen;

        }

        .login-link{

            text-align:center;
            margin-top:15px;
            font-size:14px;

        }

        a{

            text-decoration:none;
            color:#007BFF;

        }

        /* EXTRA SMALL MOBILE */

        @media screen and (max-width:480px){

            body{

                padding:5px;

            }

            .container{

                padding:15px;

            }

            h2{

                font-size:20px;

            }

            input{

                padding:9px;
                font-size:13px;

            }

            button{

                padding:9px;
                font-size:14px;

            }

        }

    </style>

</head>

<body>

<div class="container">

    <h2>Registration</h2>

    <form action="/register"
          method="post"
          enctype="multipart/form-data">

        <label>Full Name</label>

        <input type="text"
               name="full_name"
               required>

        <label>Username</label>

        <input type="text"
               name="username"
               required>

        <label>Password</label>

        <input type="password"
               name="password"
               required>

        <label>Phone Number</label>

        <input type="text"
               name="phone"
               required>

        <label>Age</label>

        <input type="number"
               name="age"
               required>

        <label>Unique ID</label>

        <input type="text"
               name="unique_id"
               required>

        <label>ID Proof</label>

        <input type="file"
               name="id_proof"
               required>

        <label>Face Photo</label>

        <input type="file"
               name="face_image"
               required>

        <button type="submit">

            Register

        </button>

    </form>

    <br>

    <a href="/apply_candidate">

        <button type="button"
                class="candidate-btn">

            Apply as Candidate

        </button>

    </a>

    <div class="login-link">

        Already have account?

        <a href="/login">

            Login

        </a>

    </div>

</div>

</body>
</html>
