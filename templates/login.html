<!DOCTYPE html>
<html>

<head>

    <title>Login</title>

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <style>

        body{
            font-family:Arial;
            background:#f2f5f9;
            margin:0;
            padding:0;

            display:flex;
            justify-content:center;
            align-items:center;

            height:100vh;
        }

        .box{

            width:90%;
            max-width:400px;

            background:white;

            padding:30px;

            border-radius:10px;

            box-shadow:0 0 10px rgba(0,0,0,0.1);

        }

        h2{

            text-align:center;
            margin-bottom:25px;

        }

        label{

            font-weight:bold;

        }

        input{

            width:100%;

            padding:12px;

            margin-top:10px;
            margin-bottom:20px;

            border:1px solid #ccc;

            border-radius:5px;

            font-size:16px;

            box-sizing:border-box;

        }

        button{

            width:100%;

            padding:12px;

            background:#007BFF;

            color:white;

            border:none;

            border-radius:5px;

            font-size:16px;

            cursor:pointer;

        }

        button:hover{

            background:#0056b3;

        }

        .register-link{

            text-align:center;

            margin-top:20px;

        }

        a{

            text-decoration:none;
            color:#007BFF;

        }

        a:hover{

            text-decoration:underline;

        }

        /* MOBILE */

        @media screen and (max-width:768px){

            .box{

                padding:20px;

            }

            h2{

                font-size:24px;

            }

            input{

                font-size:15px;

            }

            button{

                font-size:15px;

            }

        }

    </style>

</head>

<body>

<div class="box">

    <h2>Online Voting Login</h2>

    <form action="/login"
          method="post">

        <!-- USERNAME -->

        <label>Username</label>

        <input type="text"
               name="username"
               placeholder="Enter Username"
               required>

        <!-- PASSWORD -->

        <label>Password</label>

        <input type="password"
               name="password"
               placeholder="Enter Password"
               required>

        <!-- LOGIN BUTTON -->

        <button type="submit">

            Login

        </button>

    </form>

    <!-- REGISTER -->

    <div class="register-link">

        <p>

            Don't have an account?

            <a href="/register">

                Register

            </a>

        </p>
        <a href="/results" class="view-results-btn">
        <span>📊 View Live Results</span>
    </a>

    </div>

</div>

</body>
</html>
