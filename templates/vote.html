<!DOCTYPE html>
<html>

<head>

    <title>Vote</title>

    <style>

        body{
            font-family:Arial;
            background:#f2f5f9;
            margin:0;
            padding:0;
        }

        .container{
            width:90%;
            margin:auto;
            margin-top:30px;
        }

        h1{
            text-align:center;
        }

        .candidate-box{
            background:white;
            padding:20px;
            margin-bottom:20px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);

            display:flex;
            align-items:center;
            gap:20px;
        }

        img{
            width:120px;
            height:120px;
            object-fit:cover;
            border-radius:10px;
        }

        .info{
            flex:1;
        }

        button{
            padding:12px 20px;
            background:#007BFF;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            background:#0056b3;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>Vote for Your Candidate</h1>

    <form action="/submit" method="post">

        {% for c in candidates %}

        <div class="candidate-box">

            <img src="/candidate_photos/{{ c[2] }}">

            <div class="info">

                <h2>{{ c[0] }}</h2>

                <h3>{{ c[1] }}</h3>

            </div>

            <button
                type="submit"
                name="candidate"
                value="{{ c[0] }}">

                Vote

            </button>

        </div>

        {% endfor %}

    </form>

</div>

</body>
</html>
