<!DOCTYPE html>
<html>

<head>

    <title>Vote</title>

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <style>

        body{
            font-family:Arial;
            background:#f2f5f9;
            margin:0;
            padding:0;
        }

        .logout-btn{

            position:absolute;

            top:20px;
            right:20px;

            background:#dc3545;

            color:white;

            padding:10px 18px;

            border-radius:5px;

            text-decoration:none;

            font-weight:bold;

        }

        .logout-btn:hover{

            background:#b02a37;

        }

        .container{
            width:90%;
            margin:auto;
            margin-top:80px;
        }

        h1{
            text-align:center;
            margin-bottom:30px;
        }

        .candidate-box{
            background:white;
            padding:20px;
            margin-bottom:20px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);

            display:flex;
            align-items:center;
            gap:20px;
        }

        img{
            width:120px;
            height:120px;
            object-fit:cover;
            border-radius:10px;
        }

        .info{
            flex:1;
        }

        h2{
            margin:0;
        }

        h3{
            color:#555;
        }

        button{
            padding:12px 20px;
            background:#007BFF;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#0056b3;
        }

        /* ---------------- MOBILE ---------------- */

        @media screen and (max-width:768px){

            .candidate-box{

                flex-direction:column;
                text-align:center;

            }

            img{

                width:100px;
                height:100px;

            }

            button{

                width:100%;

            }

            .logout-btn{

                top:10px;
                right:10px;
                padding:8px 12px;
                font-size:14px;

            }

            .container{

                width:95%;
                margin-top:70px;

            }

            h1{

                font-size:24px;

            }

        }

    </style>

</head>

<body>

<a href="/logout" class="logout-btn">

    Logout

</a>

<div class="container">

    <h1>Vote for Your Candidate</h1>

    <form action="/submit" method="post">

        {% for c in candidates %}

        <div class="candidate-box">

            <img src="/candidate_photos/{{ c[2] }}">

            <div class="info">

                <h2>{{ c[0] }}</h2>

                <h3>{{ c[1] }}</h3>

            </div>

            <button
                type="submit"
                name="candidate"
                value="{{ c[0] }}">

                Vote

            </button>

        </div>

        {% endfor %}

    </form>

</div>

</body>
</html>
